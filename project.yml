name: kv4patl
options:
  bundleIdPrefix: com.blakeross
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  kv4patl:
    type: application
    platform: iOS
    sources:
      - path: kv4patl
        excludes:
          - Info-macOS.plist
          - kv4patl-macOS.entitlements
    resources:
      - path: kv4patl/Settings.bundle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakeross.kv4patl
        INFOPLIST_FILE: kv4patl/Info.plist
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: kv4patl/kv4patl-Bridging-Header.h
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - kv4patl_tests
  kv4patl-macOS:
    type: application
    platform: macOS
    sources:
      - path: kv4patl
        excludes:
          - Settings.bundle
          - Info.plist
          - Info-macOS.plist
          - kv4patl-macOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakeross.kv4patl
        PRODUCT_MODULE_NAME: kv4patl
        INFOPLIST_FILE: kv4patl/Info-macOS.plist
        CODE_SIGN_ENTITLEMENTS: kv4patl/kv4patl-macOS.entitlements
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: kv4patl/kv4patl-Bridging-Header.h
        SUPPORTED_PLATFORMS: "macosx"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    scheme:
      testTargets:
        - kv4patl_macOS_tests
  kv4patl_tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: kv4patl_tests
    dependencies:
      - target: kv4patl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakeross.kv4patl.tests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
  kv4patl_macOS_tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: kv4patl_tests
    dependencies:
      - target: kv4patl-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakeross.kv4patl.tests.macos
        PRODUCT_MODULE_NAME: kv4patl_tests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "macosx"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
