name: kv4patl
options:
  bundleIdPrefix: com.blakeross
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  kv4patl:
    type: application
    platform: iOS
    sources:
      - path: kv4patl
    resources:
      - path: kv4patl/Settings.bundle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakeross.kv4patl
        INFOPLIST_FILE: kv4patl/Info.plist
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2DNZVXR935
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: kv4patl/kv4patl-Bridging-Header.h
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - kv4patl_tests
  kv4patl_tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: kv4patl_tests
    dependencies:
      - target: kv4patl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blakeross.kv4patl.tests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1"
